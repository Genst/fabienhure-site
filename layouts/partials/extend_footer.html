{{ if or .Params.mermaid .Site.Params.mermaid }}
<script type="module">
  import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid/dist/mermaid.esm.min.mjs';
  window.mermaid = mermaid;

  function themeConfig() {
    const isDark = document.body.classList.contains('dark');
    return {
      startOnLoad: false,
      theme: 'base',
      fontFamily: 'inherit',
      themeVariables: isDark ? {
        primaryColor: '#1f2540',
        primaryBorderColor: '#8f80f2',
        primaryTextColor: '#e6e6ea',
        secondaryColor: '#2a2f4a',
        tertiaryColor: '#242a45',
        lineColor: '#6c6f87',
        fontSize: '15px'
      } : {
        primaryColor: '#f4f3ff',
        primaryBorderColor: '#6c5ce0',
        primaryTextColor: '#1f2937',
        secondaryColor: '#eceaff',
        tertiaryColor: '#f6f5ff',
        lineColor: '#9aa0b4',
        fontSize: '15px'
      }
    };
  }

  /* Convert each code block to a container that retains its source, so we can
     re-render with the correct palette when the reader toggles the theme. */
  const containers = Array.from(document.querySelectorAll('pre.mermaid')).map((el) => {
    const div = document.createElement('div');
    div.className = 'mermaid';
    div.dataset.src = el.textContent;
    div.textContent = el.textContent;
    el.parentNode.replaceChild(div, el);
    return div;
  });

  let rendering = false;
  async function render() {
    if (!containers.length || rendering) return;
    rendering = true;
    mermaid.initialize(themeConfig());
    for (const div of containers) {
      div.removeAttribute('data-processed');
      div.innerHTML = div.dataset.src;
    }
    await mermaid.run({ nodes: containers });
    rendering = false;
  }

  render();

  /* Re-render when the theme toggle flips the palette. */
  const toggle = document.getElementById('theme-toggle');
  if (toggle) toggle.addEventListener('click', () => setTimeout(render, 60));
</script>
{{ end }}
