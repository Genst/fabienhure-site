baseURL = "https://fabienhure.com/"
title = "Fabien Huré"
locale = "en-gb"
theme = "PaperMod"

enableRobotsTXT = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"
  category = "categories"
  series = "series"

[markup]
  [markup.goldmark.extensions.passthrough]
    enable = true
    [markup.goldmark.extensions.passthrough.delimiters]
      block = [['\[', '\]'], ['$$', '$$']]
      inline = [['\(', '\)'], ['$', '$']]
  [markup.highlight]
    noClasses = false
    codeFences = true
    guessSyntax = true
    tabWidth = 4

[params]
    author = "Fabien Huré"
    description = "Notes on quantitative finance, analytics platforms, and engineering trade-offs."
    defaultTheme = "auto"
    ShowReadingTime = true
    ShowBreadCrumbs = true
    ShowCodeCopyButtons = true
    ShowPostNavLinks = true
    ShowRssButtonInSectionTermList = true
    assets.favicon = "/favicon.svg"
    assets.favicon16x16 = "/favicon-16x16.png"
    assets.favicon32x32 = "/favicon-32x32.png"
    assets.apple_touch_icon = "/apple-touch-icon.png"
    mermaid = true
    ShowShareButtons = true

    # Site-wide fallback OpenGraph/Twitter card image. Per-post `cover.image` or
    # `images` front matter overrides this. Export the PNG from the provided SVG
    # source (see docs/relaunch-plan.md) and drop it at the path below.
    images = ["images/og-default.png"]

    mainSections = ["blog"]

    [params.label]
        text = "Fabien Huré"
        icon = "/favicon.svg"
        iconHeight = 28

    [params.analytics]
        [params.analytics.cloudflare]
            token = "4ce209ddfd9d46e386706f713a883c48"

    [params.homeInfoParams]
        Title = "Fabien Huré"
        Content = "Quantitative finance and software engineering lead, two decades building and rebuilding front-office derivatives, pricing, and risk platforms. I write on quant finance, the Quantara project, AI, engineering, and architecture, and post my talks. Start with the [blog](/blog/) or [presentations](/presentations/)."
    [params.opengraph]
        enable = true
    [params.twitter]
        enable = true

[[params.socialIcons]]
  name = "email"
  url = "mailto:contact@fabienhure.com"

[[params.socialIcons]]
  name = "linkedin"
  url = "https://www.linkedin.com/in/fabien-huré/"

[[params.socialIcons]]
  name = "github"
  url = "https://github.com/Genst"

[[params.socialIcons]]
  name = "rss"
  url = "/index.xml"

[menu]
